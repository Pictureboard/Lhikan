<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lhikan - Register</title>
</head>
<body>
    <h1>Registrazione</h1>

    <input type="text"     id="userName" placeholder="Username">
    <input type="email"    id="email"    placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="submitBtn" onclick="register()">Registrati</button>

    <p id="message"></p>

    <script>
        async function register() {
            const userName = document.getElementById('userName').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submitBtn');
            const msg      = document.getElementById('message');

            // Validazione base lato client
            if (!userName || !email || !password) {
                msg.innerText = 'Compila tutti i campi';
                return;
            }

            if (password.length < 8) {
                msg.innerText = 'La password deve essere di almeno 8 caratteri';
                return;
            }

            // Disabilitiamo il bottone per evitare invii multipli
            btn.disabled  = true;
            btn.innerText = 'Attendere...';
            msg.innerText = '';

            try {
                const response = await fetch('http://localhost/Lhikan/backend/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userName, email, password })
                });

                const data = await response.json();
                msg.innerText = data.message || data.error;

                if (response.ok) {
                    localStorage.setItem('pendingEmail', email);
                    window.location.href = 'verify2fa.html';
                } else {
                    // Riabilitiamo il bottone solo in caso di errore
                    btn.disabled  = false;
                    btn.innerText = 'Registrati';
                }

            } catch (err) {
                msg.innerText = 'Errore di connessione, riprova';
                btn.disabled  = false;
                btn.innerText = 'Registrati';
            }
        }
    </script>
</body>
</html>
