<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lhikan - Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen active">
    <h1>Lhikan ⚓</h1>
    <p id="status" class="message"></p>
    <input type="text" id="roomIdInput" placeholder="Nome stanza">
    <button id="createBtn">Crea stanza</button>
    <button id="joinBtn">Entra</button>
    <h3>Stanze disponibili:</h3>
    <ul id="roomList"></ul>
    <p id="lobbyMessage" class="message"></p>
</div>

<!-- STANZA -->
<div id="roomScreen" class="screen">
    <h2>Stanza: <span id="currentRoomName"></span></h2>
    <p id="roomStatus" class="message"></p>
    <button id="readyBtn">Ready</button>
    <button id="leaveRoomBtn">Lascia stanza</button>
    <p id="roomMessage" class="message"></p>
</div>

<!-- PIAZZAMENTO NAVI -->
<div id="placementScreen" class="screen">
    <h2>Piazza le tue navi 🚢</h2>
    <p class="message">Clicca una nave per selezionarla, poi clicca sulla griglia per piazzarla. <strong>R</strong> per ruotare.</p>
    <p id="placementMessage" class="message"></p>
    <div id="shipList"></div>
    <div id="placementGrid" class="grid-wrapper">
        <div class="grid-label">La tua griglia</div>
        <div class="grid" id="myPlacementGrid"></div>
    </div>
    <button id="confirmPlacementBtn" disabled>Conferma piazzamento ✅</button>
</div>

<!-- PARTITA -->
<div id="gameScreen" class="screen">
    <div id="enemyGridWrapper" class="grid-wrapper large enemy">
        <div class="grid-label">🎯 Griglia nemica</div>
        <div class="grid" id="enemyGrid"></div>
    </div>
    <div id="gameInfo">
        <span id="currentTurn">-</span>
        <span id="gameStatus">-</span>
    </div>
    <div id="diceArea">
        <div id="diceDisplay">🎲 🎲</div>
        <p id="diceResult" class="message"></p>
        <button id="rollDiceBtn" disabled>Tira i dadi 🎲</button>
    </div>
    <div id="myGridWrapper" class="grid-wrapper small">
        <div class="grid-label">🛡️ La tua griglia</div>
        <div class="grid" id="myGrid"></div>
    </div>
    <button id="leaveGameBtn">Abbandona partita</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="game.js"></script>
</body>
</html>
