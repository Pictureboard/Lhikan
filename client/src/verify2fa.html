<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lhikan - Verifica</title>
</head>
<body>
    <h1>Verifica codice 2FA</h1>

    <input type="text" id="code" placeholder="Inserisci il codice ricevuto via email" maxlength="6">
    <button id="submitBtn" onclick="verify()">Verifica</button>
    <p id="message"></p>

    <script>
        // Se non c'è email in localStorage mandiamo subito indietro
        if (!localStorage.getItem('pendingEmail')) {
            window.location.href = 'login.html';
        }

        async function verify() {
            const email = localStorage.getItem('pendingEmail');
            const code  = document.getElementById('code').value.trim();
            const btn   = document.getElementById('submitBtn');
            const msg   = document.getElementById('message');

            if (!code || code.length !== 6) {
                msg.innerText = 'Inserisci un codice di 6 cifre';
                return;
            }

            btn.disabled  = true;
            btn.innerText = 'Attendere...';
            msg.innerText = '';

            try {
                const response = await fetch('http://localhost/Lhikan/backend/api/verify2fa.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });

                const data = await response.json();
                msg.innerText = data.message || data.error;

                if (response.ok) {
                    localStorage.removeItem('pendingEmail');
                    // Salviamo il token JWT e i dati utente
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    // Redirect alla home
                    window.location.href = 'home.html';
                } else {
                    btn.disabled  = false;
                    btn.innerText = 'Verifica';
                }

            } catch (err) {
                msg.innerText = 'Errore di connessione, riprova';
                btn.disabled  = false;
                btn.innerText = 'Verifica';
            }
        }
    </script>
</body>
</html>
