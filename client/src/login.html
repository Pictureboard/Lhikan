<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lhikan - Login</title>
</head>
<body>
    <h1>Login</h1>

    <input type="email"    id="email"    placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="submitBtn" onclick="login()">Accedi</button>

    <p id="message"></p>

    <script>
        async function login() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submitBtn');
            const msg      = document.getElementById('message');

            if (!email || !password) {
                msg.innerText = 'Compila tutti i campi';
                return;
            }

            btn.disabled  = true;
            btn.innerText = 'Attendere...';
            msg.innerText = '';

            try {
                const response = await fetch('http://localhost/Lhikan/backend/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                msg.innerText = data.message || data.error;

                if (response.ok) {
                    localStorage.setItem('pendingEmail', email);
                    window.location.href = 'verify2fa.html';
                } else {
                    btn.disabled  = false;
                    btn.innerText = 'Accedi';
                }

            } catch (err) {
                msg.innerText = 'Errore di connessione, riprova';
                btn.disabled  = false;
                btn.innerText = 'Accedi';
            }
        }
    </script>
</body>
</html>
