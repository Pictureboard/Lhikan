<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lhikan - Login</title>
</head>
<body>
    <h1>Login</h1>

    <input type="email"    id="email"    placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Accedi</button>

    <p id="message"></p>

    <script>
        async function login() {
            const email    = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validazione base lato client
            if (!email || !password) {
                document.getElementById('message').innerText = 'Compila tutti i campi';
                return;
            }

            const response = await fetch('http://localhost/Lhikan/backend/api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            document.getElementById('message').innerText = data.message || data.error;

            if (response.ok) {
                // Salviamo l'email per verify2fa.html
                localStorage.setItem('pendingEmail', email);
                window.location.href = 'verify2fa.html';
            }
        }
    </script>
</body>
</html>
